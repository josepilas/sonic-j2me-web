<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sonic-j2me-web</title>
    <script type="module" crossorigin src="/assets/index-DLUmoZqi.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DmKtEDsH.css">
  </head>
  <body>
    <main id="app" aria-label="Sonic J2ME web runtime">
      <div id="screen-shell">
        <canvas id="game-screen" width="240" height="320" tabindex="0" aria-label="Sonic game screen"></canvas>
        <button id="fullscreen-toggle" class="screen-action" type="button" aria-label="Tela cheia" title="Tela cheia">&#x26F6;</button>
      </div>
      <section id="touch-controls" aria-label="Controles touch">
        <div class="touch-dpad">
          <button type="button" data-j2me-key="up" aria-label="Cima">&uarr;</button>
          <button type="button" data-j2me-key="left" aria-label="Esquerda">&larr;</button>
          <button type="button" data-j2me-key="down" aria-label="Baixo">&darr;</button>
          <button type="button" data-j2me-key="right" aria-label="Direita">&rarr;</button>
        </div>
        <div class="touch-actions">
          <button type="button" data-j2me-key="pause" aria-label="Pause">P</button>
          <button type="button" data-j2me-key="fire" aria-label="Acao">A</button>
        </div>
      </section>
    </main>
  </body>
</html>
